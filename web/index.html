<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SarkariSewa — Nepal's premier government exam preparation platform with AI Viva, Writing Practice, and 1v1 Battles.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SarkariSewa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SarkariSewa — Nepal Lok Sewa Exam Prep</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Remove browser default outline & margins that cause a blue border on Flutter Web */
    html, body {
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      height: 100%;
      width: 100%;
      background-color: #0d0022;
      overflow: hidden;
    }

    /* Remove focus outline on the Flutter canvas element */
    flt-glass-pane, flt-scene-host, canvas, flt-rendering-backend {
      outline: none !important;
      border: none !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
